<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bedir Kahveci Styling — Çok Yakında</title>
  <meta name="description" content="Bedir Kahveci Styling çok yakında online'da. Modern erkek giyim için hazır olun." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f8f6f2;
      --gold: #c9a96e;
      --gray: #6b6b6b;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    /* ── Arka plan dokusu ── */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(201,169,110,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 20%, rgba(201,169,110,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grain */
    body::after {
      content: "";
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    /* ── Logo çizgisi ── */
    .top-line {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: shimmer 3s ease infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* ── Üst logo ── */
    .logo {
      position: fixed;
      top: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--white);
      opacity: 0;
      animation: fadeDown 1s ease 0.2s forwards;
      white-space: nowrap;
    }

    /* ── Ana içerik ── */
    .content {
      max-width: 680px;
      width: 100%;
    }

    .eyebrow {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0;
      animation: fadeUp 1s ease 0.4s forwards;
      margin-bottom: 2rem;
    }

    .eyebrow::before,
    .eyebrow::after {
      content: "—";
      margin: 0 0.8rem;
      opacity: 0.5;
    }

    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.5rem, 10vw, 7rem);
      font-weight: 300;
      line-height: 0.95;
      letter-spacing: -0.01em;
      color: var(--white);
      opacity: 0;
      animation: fadeUp 1.2s ease 0.6s forwards;
      margin-bottom: 1rem;
    }

    .headline em {
      font-style: italic;
      color: var(--gold);
    }

    .subline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      font-weight: 300;
      font-style: italic;
      color: rgba(248,246,242,0.5);
      opacity: 0;
      animation: fadeUp 1.2s ease 0.8s forwards;
      margin-bottom: 3.5rem;
      letter-spacing: 0.02em;
    }

    /* ── Ayırıcı ── */
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 3.5rem;
      opacity: 0;
      animation: fadeUp 1s ease 1s forwards;
    }

    /* ── E-posta formu ── */
    .form-label {
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 1s ease 1.1s forwards;
    }

    .form {
      display: flex;
      gap: 0;
      max-width: 420px;
      margin: 0 auto;
      opacity: 0;
      animation: fadeUp 1s ease 1.2s forwards;
      border: 1px solid rgba(201,169,110,0.25);
      border-radius: 2px;
      overflow: hidden;
    }

    .form input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 1rem 1.2rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      color: var(--white);
      min-width: 0;
    }

    .form input::placeholder {
      color: rgba(248,246,242,0.25);
      letter-spacing: 0.15em;
      font-size: 0.7rem;
      text-transform: uppercase;
    }

    .form button {
      background: var(--gold);
      border: none;
      padding: 1rem 1.5rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--black);
      cursor: pointer;
      transition: background 0.2s ease, opacity 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .form button:hover {
      background: #d4b47e;
    }

    .form button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .success-msg {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
      margin-top: 1.2rem;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .success-msg.show { opacity: 1; }

    /* ── Alt bilgi ── */
    .footer {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 2rem;
      opacity: 0;
      animation: fadeUp 1s ease 1.5s forwards;
      white-space: nowrap;
    }

    .footer a {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gray);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer a:hover { color: var(--gold); }

    .footer-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0.4;
    }

    /* ── Animasyonlar ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateX(-50%) translateY(-12px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ── Dekor ── */
    .deco-circle {
      position: fixed;
      border-radius: 50%;
      border: 1px solid rgba(201,169,110,0.08);
      pointer-events: none;
    }

    .deco-circle-1 {
      width: 600px; height: 600px;
      bottom: -200px; right: -150px;
      animation: rotateSlow 40s linear infinite;
    }

    .deco-circle-2 {
      width: 400px; height: 400px;
      top: -100px; left: -100px;
      animation: rotateSlow 30s linear infinite reverse;
    }

    @keyframes rotateSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── Mobil ── */
    @media (max-width: 480px) {
      .form { flex-direction: column; }
      .form button { width: 100%; }
      .footer { gap: 1rem; }
    }
  </style>
</head>
<body>

  <div class="top-line"></div>

  <div class="logo">Bedir Kahveci Styling</div>

  <!-- Dekor -->
  <div class="deco-circle deco-circle-1"></div>
  <div class="deco-circle deco-circle-2"></div>

  <div class="wrapper">
    <div class="content">

      <p class="eyebrow">Çok Yakında</p>

      <h1 class="headline">
        Online'dayız<br /><em>neredeyse.</em>
      </h1>

      <p class="subline">Modern erkek giyim, yakında kapınızda.</p>

      <div class="divider"></div>

      <p class="form-label">Haberdar ol</p>

      <form class="form" id="notifyForm">
        <input
          type="email"
          id="emailInput"
          placeholder="E-posta adresiniz"
          autocomplete="email"
          required
        />
        <button type="submit" id="submitBtn">Bildir</button>
      </form>

      <p class="success-msg" id="successMsg">
        ✦ Kaydınız alındı, yakında görüşürüz.
      </p>

    </div>
  </div>

  <div class="footer">
    <a href="mailto:info@bedirkahvecistyling.com">info@bedirkahvecistyling.com</a>
    <div class="footer-dot"></div>
    <a href="https://instagram.com" target="_blank" rel="noopener">Instagram</a>
  </div>

  <script>
    document.getElementById('notifyForm').addEventListener('submit', async function(e) {
      e.preventDefault()
      const btn = document.getElementById('submitBtn')
      const msg = document.getElementById('successMsg')
      const email = document.getElementById('emailInput').value

      btn.disabled = true
      btn.textContent = '...'

      // Basit simülasyon — Resend bağlanınca gerçek API çağrısına dönüştür
      await new Promise(r => setTimeout(r, 800))

      msg.classList.add('show')
      btn.textContent = '✓'
      document.getElementById('emailInput').value = ''
    })
  </script>

</body>
</html>
